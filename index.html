<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Download IKEA 3D models for use in Sweet Home 3D" />
    <title>IKEA 3D Model Downloader</title>
    <link rel="stylesheet" href="./src/ui/styles.css" />
  </head>
  <body>
    <div id="app" class="app-container">
      <header class="app-header">
        <h1 class="app-title">IKEA 3D Model Downloader</h1>
        <p class="app-subtitle">Download 3D models for Sweet Home 3D</p>
      </header>

      <main class="app-main">
        <div class="input-section">
          <label for="url-input" class="input-label">IKEA Product URL</label>
          <input
            id="url-input"
            type="url"
            placeholder="https://www.ikea.com/..."
            class="url-input"
            aria-label="IKEA product URL"
          />
          <p class="input-help">Paste the URL of an IKEA furniture product</p>
        </div>

        <div class="button-section">
          <button id="process-button" class="btn btn-primary" aria-label="Process IKEA product">
            Process
          </button>
          <button id="reset-button" class="btn btn-secondary" aria-label="Reset form">
            Reset
          </button>
        </div>

        <div id="status-container" class="status-container">
          <div id="status-message" class="status-message" role="status" aria-live="polite"></div>
          <div id="progress-bar-container" class="progress-bar-container" style="display: none">
            <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
          </div>
        </div>

        <div id="download-section" class="download-section" style="display: none">
          <button id="download-button" class="btn btn-success" aria-label="Download processed model">
            Download Model
          </button>
          <p class="download-help">Click to download the ZIP file with OBJ model and textures</p>
        </div>

        <div id="error-section" class="error-section" style="display: none">
          <div id="error-message" class="error-message" role="alert"></div>
          <button id="retry-button" class="btn btn-secondary" aria-label="Retry processing">
            Retry
          </button>
        </div>
      </main>

      <footer class="app-footer">
        <p>No data is sent to external servers. All processing happens in your browser.</p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
